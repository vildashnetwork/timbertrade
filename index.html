<!doctype html>
<html lang="en">

<head>
  <!-- ======================
            BASIC META
      ======================== -->
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>TimberTrade Connect | Buy & Sell Timber Securely</title>

  <!-- ======================
            PRIMARY SEO
       ====================== -->
  <meta name="description"
    content="TimberTrade Connect is a secure digital marketplace that connects timber sellers and buyers, promoting sustainable forestry and transparent timber trade." />
  <meta name="keywords"
    content="timber trade, timber marketplace, buy timber, sell timber, forestry market, wood trading platform, TimberTrade Connect" />
  <meta name="author" content="TimberTrade Connect" />
  <meta name="robots" content="index, follow" />

  <!-- =====================
       CANONICAL URL
      ====================== -->
  <link rel="canonical" href="https://www.timbertradeconnect.com/" />

  <!-- =====================
       OPEN GRAPH (Facebook, WhatsApp, LinkedIn)
       ===================== -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="TimberTrade Connect | Buy & Sell Timber Securely" />
  <meta property="og:description"
    content="A trusted platform connecting timber buyers and sellers while supporting sustainable forestry practices." />
  <meta property="og:url" content="https://www.timbertradeconnect.com/" />
  <meta property="og:image" content="https://www.timbertradeconnect.com/seo/og-image.jpg" />
  <meta property="og:site_name" content="TimberTrade Connect" />

  <!-- =========================
       TWITTER CARD
  ========================== -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="TimberTrade Connect | Buy & Sell Timber Securely" />
  <meta name="twitter:description"
    content="Connect with trusted timber buyers and sellers worldwide using TimberTrade Connect." />
  <meta name="twitter:image" content="https://www.timbertradeconnect.com/seo/og-image.jpg" />

  <!-- =====================
       FAVICONS
      ======================= -->
  <link rel="icon" type="image/png" href="/favicon.png" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <!-- =======================
       PERFORMANCE & SEO BOOST
      ======================= -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- =========================
       STRUCTURED DATA (JSON-LD)
      ========================== -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebSite",
    "name": "TimberTrade Connect",
    "url": "https://www.timbertradeconnect.com/",
    "description": "A digital marketplace connecting timber buyers and sellers securely.",
    "publisher": {
      "@type": "Organization",
      "name": "TimberTrade Connect",
      "logo": {
        "@type": "ImageObject",
        "url": "https://www.timbertradeconnect.com/logo.png"
      }
    }
  }
  </script>
</head>

<body>
  <noscript>
    TimberTrade Connect requires JavaScript to function properly.
  </noscript>

  <div id="root"></div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
